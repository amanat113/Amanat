    <script>
        let firebaseApp = null;
        let realtimeDB = null;
        let firebaseReady = false;

        function initFirebase(config) {
            return new Promise((resolve, reject) => {
                if (firebaseReady) { resolve(); return; }
                const scripts = [
                    'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js',
                    'https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js'
                ];
                let loaded = 0;
                scripts.forEach(src => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = () => {
                        loaded++;
                        if (loaded === scripts.length) {
                            try {
                                firebaseApp = firebase.initializeApp(config, 'tailorShopApp');
                                realtimeDB = firebase.database(firebaseApp);
                                firebaseReady = true;
                                resolve();
                            } catch (e) { reject(e); }
                        }
                    };
                    script.onerror = () => reject(new Error('Failed to load Firebase SDK'));
                    document.head.appendChild(script);
                });
            });
        }
    </script>

        :root {
            --bg: #FFFFFF;
            --card: #FFFFFF;

            --sky-blue-deep: rgba(0, 140, 255, 0.15);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html { font-size:16px; -webkit-tap-highlight-color:transparent; scroll-behavior:smooth; }
        body {
            font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.5;
            min-height:100vh; min-height:100dvh; max-width:500px; margin:0 auto; position:relative;
            overflow-x:hidden; padding-top:var(--header-height); padding-bottom:100px;
            -webkit-font-smoothing:antialiased;
        }
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 80%;
            background: radial-gradient(ellipse at center, var(--sky-blue-mid) 0%, var(--sky-blue-light) 40%, transparent 70%);
            pointer-events: none;
            z-index: -2;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            height: 250px;
            background: radial-gradient(ellipse at bottom, var(--sky-blue-deep) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
                .header {
            position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:500px;
            height:var(--header-height); background:var(--header-bg); display:flex; align-items:center;
            justify-content:space-between; padding:0 16px; z-index:100;
        }
        .header-btn {
            width:40px; height:40px; border-radius:50%; border:none; cursor:pointer; display:flex;
            align-items:center; justify-content:center; font-size:1.2rem; transition:var(--transition);
            background:transparent; color:#fff;
        }
        .header-btn:active { transform:scale(0.9); opacity:0.7; }
        .header-btn.gear-btn { background:var(--accent); color:#fff; width:38px; height:38px; font-size:1rem; }

        .drawer-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200;
            opacity:0; pointer-events:none; transition:opacity var(--transition); backdrop-filter:blur(2px);
        }
        .drawer-overlay.open { opacity:1; pointer-events:auto; }
        .drawer {
            position:fixed; top:0; left:0; width:280px; height:100%; background:#fff; z-index:201;
            transform:translateX(-100%); transition:transform var(--transition); box-shadow:var(--shadow-lg);
            padding:24px 20px; display:flex; flex-direction:column; gap:12px;
        }
        .drawer.open { transform:translateX(0); }
        .drawer-title { font-size:1.1rem; font-weight:700; margin-bottom:8px; padding-bottom:12px; border-bottom:1px solid var(--border); }
        .drawer-item {
            padding:14px 18px; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; font-size:0.95rem;
            transition:var(--transition); background:#FEFCF9; border:1px solid transparent;
        }
        .drawer-item:active { background:var(--accent-light); border-color:var(--accent); transform:scale(0.97); }

        .bottom-nav { display: none; }

        .dynamic-island-wrapper {
            position:fixed; bottom:12px; left:50%; transform:translateX(-50%); width:92%; max-width:440px; z-index:150;
            pointer-events: none;
        }
        .jio-curve {
            position:absolute; bottom:-6px; left:-3%; width:106%; height:70px; background:#FFFFFF;
            border-radius:50% 50% 0 0 / 70% 70% 0 0;
            box-shadow:0 -4px 20px rgba(198,153,99,0.15), 0 -2px 10px rgba(135,206,250,0.2);
            z-index:-1; pointer-events: none;
        }
        .glow-line {
            position:absolute; top:-2px; left:15%; width:70%; height:6px;
            background:linear-gradient(90deg, transparent, #C69963, #F5E1CE, #C69963, transparent);
            filter:blur(4px); border-radius:50%; z-index:0; pointer-events: none;
        }
        .island-pill {
            display:flex; align-items:center; justify-content:space-around; background:#FFFFFF;
            border-radius:34px; padding:6px 18px; box-shadow:0 8px 30px rgba(0,0,0,0.08), 0 0 20px rgba(198,153,99,0.1);
            position:relative; z-index:10; height:68px; border:1px solid rgba(198,153,99,0.15);
            pointer-events: auto;
        }
        .island-pill::after {
            content:''; position:absolute; top:-4px; left:10%; width:80%; height:10px;
            background:radial-gradient(ellipse at center, rgba(198,153,99,0.5) 0%, transparent 70%);
            filter:blur(6px); border-radius:50%; z-index:-1; pointer-events: none;
        }
        .pill-btn {
            display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
            cursor:pointer; min-width:44px; user-select:none; pointer-events: auto;
        }
        .pill-icon {
            width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-size:1.1rem; background:transparent; color:#B0A090; transition:0.3s;
        }
        .pill-btn.active .pill-icon { background:var(--accent); color:#fff; box-shadow:0 0 18px rgba(198,153,99,0.6); }
        .pill-label { font-size:0.55rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#A09080; }
        .pill-btn.active .pill-label { color:var(--accent); }
        .fab-island {
            width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg, var(--accent), var(--accent-dark));
            color:#fff; border:none; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
            box-shadow:0 6px 20px rgba(198,153,99,0.4); transition:0.25s; margin-top:-24px; z-index:20;
            position:relative; pointer-events: auto; -webkit-tap-highlight-color: transparent;
        }
        .fab-island:active { transform:scale(0.9); box-shadow:0 3px 10px rgba(198,153,99,0.3); }

        .page { display:none; padding:16px 14px; animation:fadeIn 0.3s ease; }
        .page.active { display:block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        .card {
            background:var(--card); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow);
            margin-bottom:14px; border:1px solid var(--border); transition:var(--transition); position:relative;
        }

    </style>
